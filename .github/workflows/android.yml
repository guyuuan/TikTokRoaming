name: Build Android APK

on:
  push:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag, for example v1.0.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  build:
    if: github.event_name == 'push'
    name: Build ${{ github.ref_type == 'tag' && 'release' || 'daily' }} APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.TIKTOKROAMING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "TIKTOKROAMING_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/tiktokroaming-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "TIKTOKROAMING_STORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          TIKTOKROAMING_STORE_PASSWORD: ${{ secrets.TIKTOKROAMING_STORE_PASSWORD }}
          TIKTOKROAMING_KEY_ALIAS: ${{ secrets.TIKTOKROAMING_KEY_ALIAS }}
          TIKTOKROAMING_KEY_PASSWORD: ${{ secrets.TIKTOKROAMING_KEY_PASSWORD }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ./gradlew :app:assembleRelease --no-configuration-cache
          else
            ./gradlew :app:assembleRelease --no-configuration-cache -PdailyBuild=true
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/release/TikTokRoaming-*.apk
          if-no-files-found: error
          retention-days: ${{ github.ref_type == 'tag' && 90 || 30 }}
          archive: false

      - name: Upload R8 mapping
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error
          retention-days: ${{ github.ref_type == 'tag' && 90 || 30 }}
          archive: false

  release:
    if: github.event_name == 'workflow_dispatch'
    name: Publish ${{ inputs.release_tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -z "$RELEASE_TAG" ] || [ "${RELEASE_TAG#-}" != "$RELEASE_TAG" ]; then
            echo "release_tag must not be empty or start with '-'" >&2
            exit 1
          fi
          if ! git check-ref-format "refs/tags/$RELEASE_TAG"; then
            echo "Invalid Git tag: $RELEASE_TAG" >&2
            exit 1
          fi

          existing_commit="$(git rev-list -n 1 "refs/tags/$RELEASE_TAG" 2>/dev/null || true)"
          if [ -n "$existing_commit" ] && [ "$existing_commit" != "$GITHUB_SHA" ]; then
            echo "Tag $RELEASE_TAG already points to $existing_commit instead of $GITHUB_SHA" >&2
            exit 1
          fi

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.TIKTOKROAMING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "TIKTOKROAMING_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/tiktokroaming-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "TIKTOKROAMING_STORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          TIKTOKROAMING_STORE_PASSWORD: ${{ secrets.TIKTOKROAMING_STORE_PASSWORD }}
          TIKTOKROAMING_KEY_ALIAS: ${{ secrets.TIKTOKROAMING_KEY_ALIAS }}
          TIKTOKROAMING_KEY_PASSWORD: ${{ secrets.TIKTOKROAMING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-configuration-cache -PreleaseVersionTag="$RELEASE_TAG"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/release/TikTokRoaming-*.apk
          if-no-files-found: error
          retention-days: 90
          archive: false

      - name: Upload R8 mapping
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error
          retention-days: 90
          archive: false

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          shopt -s nullglob
          apk_files=(app/build/outputs/apk/release/TikTokRoaming-*.apk)
          if [ "${#apk_files[@]}" -ne 1 ]; then
            echo "Expected exactly one release APK, found ${#apk_files[@]}" >&2
            exit 1
          fi
          apk_path="${apk_files[0]}"

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$apk_path" --clobber --repo "$GITHUB_REPOSITORY"
          else
            release_args=(
              "$RELEASE_TAG"
              "$apk_path"
              --repo "$GITHUB_REPOSITORY"
              --target "$GITHUB_SHA"
              --title "$RELEASE_TAG"
              --generate-notes
            )
            if [ "$PRERELEASE" = "true" ]; then
              release_args+=(--prerelease)
            fi
            gh release create "${release_args[@]}"
          fi
