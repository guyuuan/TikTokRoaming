name: Build Android APK

on:
  push:

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build ${{ github.ref_type == 'tag' && 'release' || 'daily' }} APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.TIKTOKROAMING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "TIKTOKROAMING_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/tiktokroaming-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "TIKTOKROAMING_STORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          TIKTOKROAMING_STORE_PASSWORD: ${{ secrets.TIKTOKROAMING_STORE_PASSWORD }}
          TIKTOKROAMING_KEY_ALIAS: ${{ secrets.TIKTOKROAMING_KEY_ALIAS }}
          TIKTOKROAMING_KEY_PASSWORD: ${{ secrets.TIKTOKROAMING_KEY_PASSWORD }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ./gradlew :app:assembleRelease --no-configuration-cache
          else
            ./gradlew :app:assembleRelease --no-configuration-cache -PdailyBuild=true
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/release/TikTokRoaming-*.apk
          if-no-files-found: error
          retention-days: ${{ github.ref_type == 'tag' && 90 || 30 }}
          archive: false

      - name: Upload R8 mapping
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error
          retention-days: ${{ github.ref_type == 'tag' && 90 || 30 }}
          archive: false
